name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate admin env vars
        env:
          VITE_GITHUB_OWNER: ${{ vars.VITE_GITHUB_OWNER || secrets.VITE_GITHUB_OWNER }}
          VITE_GITHUB_REPO: ${{ vars.VITE_GITHUB_REPO || secrets.VITE_GITHUB_REPO }}
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ vars.VITE_GITHUB_OAUTH_CLIENT_ID || secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
        run: |
          missing=""
          [ -z "$VITE_GITHUB_OWNER" ] && missing="$missing VITE_GITHUB_OWNER"
          [ -z "$VITE_GITHUB_REPO" ] && missing="$missing VITE_GITHUB_REPO"
          [ -z "$VITE_GITHUB_OAUTH_CLIENT_ID" ] && missing="$missing VITE_GITHUB_OAUTH_CLIENT_ID"

          if [ -n "$missing" ]; then
            echo "::error::Missing required variables for admin build:$missing"
            exit 1
          fi

      - name: Build
        env:
          VITE_GITHUB_OWNER: ${{ vars.VITE_GITHUB_OWNER || secrets.VITE_GITHUB_OWNER }}
          VITE_GITHUB_REPO: ${{ vars.VITE_GITHUB_REPO || secrets.VITE_GITHUB_REPO }}
          VITE_GITHUB_BRANCH: ${{ vars.VITE_GITHUB_BRANCH || secrets.VITE_GITHUB_BRANCH }}
          VITE_GITHUB_ALLOWED_USER: ${{ vars.VITE_GITHUB_ALLOWED_USER || secrets.VITE_GITHUB_ALLOWED_USER }}
          VITE_GITHUB_OAUTH_CLIENT_ID: ${{ vars.VITE_GITHUB_OAUTH_CLIENT_ID || secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}
          VITE_GITHUB_PROJECTS_PATH: ${{ vars.VITE_GITHUB_PROJECTS_PATH || secrets.VITE_GITHUB_PROJECTS_PATH }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
